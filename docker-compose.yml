version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: codex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-codex}
      POSTGRES_USER: ${DATABASE_USER:-codex}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-codex}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-codex} -d ${DATABASE_NAME:-codex}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
